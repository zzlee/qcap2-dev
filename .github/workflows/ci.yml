name: QCAP2 CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # Build and test on native amd64
  build-amd64:
    name: Build AMD64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t qcap2-build-env .

      - name: Run tests
        run: |
          docker run --rm \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            qcap2-build-env

  # Cross-compile for xlnk2_arm64 and export build artifacts
  build-xlnk2:
    name: Cross-compile xlnk2 arm64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build xlnk2 Docker image
        run: |
          docker build -t qcap2-build-env-xlnk2 -f Dockerfile.xlnk2 .

      - name: Compile inside container
        run: |
          docker create --name compile_container \
            -e USER=root -e HOST_UID=1000 -e HOST_GID=1000 \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            qcap2-build-env-xlnk2
          docker cp . compile_container:/workspace/
          docker start -a compile_container
          docker cp compile_container:/workspace/build/ build/
          docker rm compile_container

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qcap2-xlnk2-build-${{ github.ref_name }}
          path: |
            build/lib/
            build/test_*
          retention-days: 7

  # Package DEB and TGZ for amd64 releases
  package-amd64:
    name: Package DEB + TGZ
    runs-on: ubuntu-latest
    needs: [build-amd64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavfilter-dev libswresample-dev \
            libfreetype-dev libharfbuzz-dev libdrm-dev

      - name: Configure and build in Release mode
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package with CPack
        run: |
          cd build
          dpkg-deb --version 2>/dev/null || echo "dpkg-deb not available"
          cpack -G DEB -G TGZ 2>&1
          ls -lh *.deb *.tar.gz 2>/dev/null || true
          echo "--- Packages found ---"
          find . -maxdepth 1 \( -name '*.deb' -o -name '*.tar.gz' \) -ls

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: qcap2-packages-${{ github.ref_name }}
          path: |
            build/*.deb
            build/*.tar.gz
          retention-days: 30
          if-no-files-found: warn

  # Package DEB and TGZ for xlnk2 arm64
  package-xlnk2:
    name: Package xlnk2 DEB + TGZ
    runs-on: ubuntu-latest
    needs: [build-xlnk2]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build xlnk2 Docker image
        run: |
          docker build -t qcap2-build-env-xlnk2 -f Dockerfile.xlnk2 .

      - name: Compile and package
        run: |
          mkdir -p build
          docker run --rm \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            qcap2-build-env-xlnk2 \
            sh -c ". /opt/qcap-dev-init && cd build && cmake -DCMAKE_TOOLCHAIN_FILE=\${OE_CMAKE_TOOLCHAIN_FILE} -DCMAKE_EXE_LINKER_FLAGS=\"-Wl,-rpath-link,/usr/lib/aarch64-linux-gnu\" -DCMAKE_SHARED_LINKER_FLAGS=\"-Wl,-rpath-link,/usr/lib/aarch64-linux-gnu\" -DCPACK_DEBIAN_PACKAGE_ARCHITECTURE=arm64 .. && make -j\$(nproc) && cp -d /opt/sc6f0/sysroots/cortexa72-cortexa53-xilinx-linux/usr/lib/libav*.so* lib/ && cp -d /opt/sc6f0/sysroots/cortexa72-cortexa53-xilinx-linux/usr/lib/libsw*.so* lib/ && cp -d /opt/sc6f0/sysroots/cortexa72-cortexa53-xilinx-linux/usr/lib/libfreetype*.so* lib/ && cp -d /opt/sc6f0/sysroots/cortexa72-cortexa53-xilinx-linux/usr/lib/libharfbuzz*.so* lib/ && cp -d /opt/sc6f0/sysroots/cortexa72-cortexa53-xilinx-linux/usr/lib/libpng*.so* lib/ && cp -d /opt/sc6f0/sysroots/cortexa72-cortexa53-xilinx-linux/usr/lib/libgraphite2*.so* lib/ && dpkg-deb --version 2>/dev/null || echo 'dpkg-deb not available in container'; cpack -G DEB -G TGZ 2>&1; ls -lh *.deb *.tar.gz 2>/dev/null || true"

      - name: Upload xlnk2 packages
        uses: actions/upload-artifact@v4
        with:
          name: qcap2-xlnk2-packages-${{ github.ref_name }}
          path: |
            build/*.deb
            build/*.tar.gz
          retention-days: 30
          if-no-files-found: warn

  # GitHub Release (only on tags)
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-amd64]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: qcap2-packages-${{ github.ref_name }}
          path: packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref_name }}
