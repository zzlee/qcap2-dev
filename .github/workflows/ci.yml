name: QCAP2 CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # Build and test on native amd64
  build-amd64:
    name: Build AMD64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t qcap2-build-env .

      - name: Run tests
        run: |
          docker run --rm \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            qcap2-build-env

  # Cross-compile for xlnk2_arm64 and export build artifacts
  build-xlnk2:
    name: Cross-compile xlnk2 arm64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build xlnk2 Docker image
        run: |
          docker build -t qcap2-build-env-xlnk2 -f Dockerfile.xlnk2 .

      - name: Compile inside container
        run: |
          docker create --name compile_container \
            -e USER=root -e HOST_UID=1000 -e HOST_GID=1000 \
            -e GITHUB_SHA="${{ github.sha }}" \
            -e GITHUB_REF_NAME="${{ github.ref_name }}" \
            qcap2-build-env-xlnk2
          docker cp . compile_container:/workspace/
          docker start -a compile_container
          docker cp compile_container:/workspace/build/ build/
          docker rm compile_container

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qcap2-xlnk2-build-${{ github.ref_name }}
          path: |
            build/lib/
            build/test_*
          retention-days: 7

  # Package DEB and TGZ for amd64 releases
  package-amd64:
    name: Package DEB + TGZ
    runs-on: ubuntu-latest
    needs: [build-amd64]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libavfilter-dev libswresample-dev \
            libfreetype-dev libharfbuzz-dev libdrm-dev

      - name: Configure and build in Release mode
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package with CPack
        run: |
          cd build
          cpack -G DEB -G TGZ
          ls -lh *.deb *.tar.gz

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: qcap2-packages-${{ github.ref_name }}
          path: |
            build/*.deb
            build/*.tar.gz
          retention-days: 30

  # GitHub Release (only on tags)
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-amd64]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: qcap2-packages-${{ github.ref_name }}
          path: packages/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          tag_name: ${{ github.ref_name }}
