stages:
  - test
  - release

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev")'
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev")'
    - when: never

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"

.docker-job:
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker

.amd64-template:
  extends: .docker-job
  variables:
    BUILD_IMAGE: qcap2-build-env
  before_script:
    - docker build -t "$BUILD_IMAGE" .

# Build and test on native amd64
test-amd64:
  extends: .amd64-template
  stage: test
  script:
    - docker run --rm "$BUILD_IMAGE"

# Cross-compile for xlnk2_arm64 and export build artifacts
build-xlnk2:
  extends: .docker-job
  stage: test
  script:
    - docker build -t qcap2-build-env-xlnk2 -f Dockerfile.xlnk2 .
    - docker create --name compile_container -e USER=root -e HOST_UID=1000 -e HOST_GID=1000 qcap2-build-env-xlnk2
    - docker cp . compile_container:/workspace/
    - docker start -a compile_container
    - docker cp compile_container:/workspace/build/ build/
    - docker rm compile_container
  artifacts:
    name: "qcap2-xlnk2-build-$CI_COMMIT_REF_SLUG"
    paths:
      - build/lib/
      - build/test_*
    expire_in: 1 week

# Package DEB and TGZ for amd64
package-amd64:
  extends: .amd64-template
  stage: release
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "dev"'
      when: manual
      allow_failure: true
  script:
    - mkdir -p build
    - |
      docker run --rm \
        -e CI_COMMIT_SHORT_SHA="$CI_COMMIT_SHORT_SHA" \
        -e CI_COMMIT_BRANCH="$CI_COMMIT_BRANCH" \
        -e CI_COMMIT_TAG="$CI_COMMIT_TAG" \
        -v "$PWD:/workspace" \
        -w /workspace \
        "$BUILD_IMAGE" \
        sh -c "cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j\$(nproc) && cpack -G DEB -G TGZ"
    - ls -lh build/*.deb build/*.tar.gz
  artifacts:
    name: "qcap2-packages-$CI_COMMIT_REF_SLUG"
    paths:
      - build/*.deb
      - build/*.tar.gz
    expire_in: 1 month
